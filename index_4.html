<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roteiro CRC — trilha de estudos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#ECE7DA;
    --paper-panel:#FBF9F3;
    --ink:#1F2A2E;
    --ink-soft:#5B655F;
    --line:#C9C0A8;
    --leather:#6E4322;
    --leather-dark:#4C2E17;
    --gold:#B4842A;
    --gold-soft:#E8D6AE;
    --sage:#4B6A50;
    --sage-soft:#DCE7DC;
    --rust:#9C4B34;
    --rust-soft:#F1DDD3;
    --link:#3B5C77;
    --link-soft:#DCE5EA;
    --radius:4px;
    --shadow:0 1px 2px rgba(31,42,46,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--paper);font-family:'IBM Plex Sans', sans-serif;}

  #crc-app{
    font-family:'IBM Plex Sans', sans-serif;
    color:var(--ink);
    background:var(--paper);
    background-image:
      linear-gradient(var(--paper) 0%, var(--paper) 100%),
      repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(110,67,34,0.045) 28px);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    display:flex;
    min-height:100vh;
    max-width:1260px;
    margin:0 auto;
  }

  /* ---------- SIDEBAR ---------- */
  .sidebar{ width:230px; flex-shrink:0; background:var(--leather-dark); color:#EFE6D6; padding:20px 0 14px; display:flex; flex-direction:column; }
  .sidebar-head{ padding:0 16px 14px; border-bottom:1px solid rgba(239,230,214,0.18); margin-bottom:6px; }
  .sidebar-head .stamp{ display:inline-block; font-family:'IBM Plex Mono', monospace; font-size:9.5px; letter-spacing:1.5px; color:var(--gold-soft); border:1px solid var(--gold-soft); padding:2px 6px; border-radius:2px; margin-bottom:9px; }
  .sidebar-head h1{ font-family:'Source Serif 4', serif; font-size:18px; font-weight:600; margin:0 0 4px; line-height:1.25; }
  .sidebar-head p{ font-size:11px; color:#C9BBA0; margin:0; }

  .nav-section-lbl{ font-family:'IBM Plex Mono', monospace; font-size:9px; letter-spacing:1px; text-transform:uppercase; color:#B7A688; padding:10px 16px 4px; }

  .top-nav{ padding:2px 0 6px; }
  .week-nav{ flex:1; overflow-y:auto; padding:2px 0; }
  .week-btn{ width:100%; text-align:left; background:none; border:none; color:#DCCFB4; font-family:'IBM Plex Sans', sans-serif; font-size:12px; padding:8px 16px; cursor:pointer; display:flex; align-items:center; gap:8px; border-left:3px solid transparent; transition:background .12s ease, border-color .12s ease; }
  .week-btn:hover{ background:rgba(239,230,214,0.06); }
  .week-btn.active{ background:rgba(239,230,214,0.1); border-left-color:var(--gold); color:#FBF6EA; font-weight:500; }
  .week-num{ font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--gold-soft); width:18px; flex-shrink:0; }
  .week-btn span.wt{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .week-dot{ width:7px;height:7px;border-radius:50%; background:rgba(239,230,214,0.25); flex-shrink:0; }
  .week-dot.complete{ background:var(--sage-soft); }
  .week-dot.partial{ background:var(--gold-soft); }
  .week-dot.overdue{ background:var(--rust); }

  .sidebar-foot{ padding:12px 16px 0; border-top:1px solid rgba(239,230,214,0.18); font-family:'IBM Plex Mono', monospace; font-size:10px; color:#C9BBA0; }
  .foot-row{ display:flex; align-items:center; justify-content:space-between; gap:6px; margin-bottom:6px; }
  .foot-row label{ flex-shrink:0; }
  .foot-row input{
    width:52px; background:rgba(239,230,214,0.08); border:1px solid rgba(239,230,214,0.25);
    color:#FBF6EA; border-radius:3px; font-family:'IBM Plex Mono', monospace; font-size:10.5px;
    padding:2px 4px; text-align:right;
  }
  .foot-hint{ font-size:9px; color:#9C8D72; margin-top:4px; line-height:1.5; }

  /* ---------- MAIN ---------- */
  .main{ flex:1; display:flex; flex-direction:column; min-width:0; }
  .topbar{ padding:18px 26px 14px; border-bottom:1px solid var(--line); background:var(--paper-panel); display:flex; align-items:flex-end; justify-content:space-between; gap:18px; flex-wrap:wrap; }
  .topbar-left .eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:1px; color:var(--ink-soft); text-transform:uppercase; margin-bottom:3px; }
  .topbar-left h2{ font-family:'Source Serif 4', serif; font-size:22px; margin:0; font-weight:600; }
  .topbar-left .sub{ font-size:12px; color:var(--ink-soft); margin-top:3px; }
  .topbar-left .sub b{ color:var(--leather); }
  .countdown{ text-align:right; }
  .countdown .num{ font-family:'IBM Plex Mono', monospace; font-size:30px; font-weight:600; color:var(--rust); line-height:1; }
  .countdown .lbl{ font-size:10px; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.6px; }

  .progress-strip{ padding:10px 26px; background:var(--paper-panel); border-bottom:1px solid var(--line); display:flex; align-items:center; gap:12px; }
  .progress-strip .bar-track{ flex:1; height:6px; background:var(--gold-soft); border-radius:4px; overflow:hidden; }
  .progress-strip .bar-fill{ height:100%; background:var(--leather); transition:width .3s ease; }
  .progress-strip .pct{ font-family:'IBM Plex Mono', monospace; font-size:11.5px; color:var(--leather-dark); width:36px; text-align:right; }

  .content{ flex:1; overflow-y:auto; padding:18px 26px 30px; }

  /* overdue banner */
  .overdue-banner{
    background:var(--rust-soft); border:1px solid var(--rust); border-radius:var(--radius);
    padding:10px 14px; margin-bottom:16px; font-size:12.5px; color:var(--leather-dark);
  }
  .overdue-banner .head{ display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:10px; }
  .overdue-banner .head b{ color:var(--rust); }
  .overdue-list{ display:none; margin-top:8px; flex-wrap:wrap; gap:5px; }
  .overdue-list.open{ display:flex; }
  .overdue-tag{ font-size:11px; background:#fff; border:1px solid var(--rust); color:var(--rust); padding:3px 8px; border-radius:20px; cursor:pointer; }

  /* priority filter chips */
  .filter-row{ display:flex; align-items:center; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
  .filter-row .flbl{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-right:2px; }
  .filter-chip{
    font-size:11px; padding:4px 10px; border-radius:20px; cursor:pointer; border:1px solid var(--line);
    background:var(--paper-panel); color:var(--ink-soft);
  }
  .filter-chip.active{ background:var(--leather); color:#fff; border-color:var(--leather); }

  .week-header{ margin-bottom:2px; }
  .week-header h3{ font-family:'Source Serif 4', serif; font-size:18px; margin:0 0 2px; }
  .week-note{ font-size:12px; color:var(--ink-soft); margin:0 0 14px; }

  /* weekly day-by-day schedule */
  .day-schedule{ margin-bottom:18px; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:var(--paper-panel); box-shadow:var(--shadow); }
  .day-schedule-title{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--ink-soft); padding:8px 12px 4px; }
  .day-row{ display:flex; align-items:center; gap:10px; padding:6px 12px; border-top:1px solid var(--line); font-size:12px; }
  .day-row:first-of-type{ border-top:none; }
  .day-row .day-name{ width:96px; flex-shrink:0; font-weight:500; color:var(--leather); }
  .day-row .day-dur{ font-family:'IBM Plex Mono', monospace; font-size:10px; background:var(--link-soft); color:var(--link); padding:2px 7px; border-radius:20px; flex-shrink:0; white-space:nowrap; }
  .day-row .day-activity{ flex:1; color:var(--ink); }
  .day-row.rest .day-activity{ color:var(--ink-soft); font-style:italic; }
  .day-row.sim .day-dur{ background:var(--rust-soft); color:var(--rust); }
  .day-row.rest .day-dur{ background:var(--sage-soft); color:var(--sage); }

  /* per-topic minute breakdown */
  .steps-wrap{ margin-bottom:10px; }
  .steps-wrap .k{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:5px; }
  .step-row{ display:flex; align-items:center; gap:8px; padding:3px 0; font-size:12px; }
  .step-row .step-time{ font-family:'IBM Plex Mono', monospace; font-size:10px; color:var(--leather); width:44px; flex-shrink:0; text-align:right; }
  .step-row .step-bar{ height:5px; background:var(--gold-soft); border-radius:3px; flex-shrink:0; }
  .step-row .step-label{ color:var(--ink); }

  .topics-spine{ position:relative; padding-left:14px; border-left:2px solid var(--gold-soft); }
  .topic-card{ position:relative; margin-bottom:16px; }
  .topic-card::before{ content:''; position:absolute; left:-19px; top:8px; width:9px;height:9px; border-radius:50%; background:var(--gold); border:2px solid var(--paper); }
  .topic-card.done::before{ background:var(--sage); }
  .topic-card.hidden{ display:none; }

  .topic-head{ display:flex; align-items:center; gap:10px; cursor:pointer; flex-wrap:wrap; }
  .topic-head input[type=checkbox]{ width:16px;height:16px; accent-color:var(--sage); cursor:pointer; flex-shrink:0; }
  .topic-name{ font-size:14px; font-weight:500; }
  .topic-name.done{ text-decoration:line-through; color:var(--ink-soft); font-weight:400; }
  .meta-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-left:auto; }
  .priority{ font-family:'IBM Plex Mono', monospace; font-size:9px; letter-spacing:.3px; text-transform:uppercase; padding:2px 6px; border-radius:20px; white-space:nowrap; }
  .priority.alta{ background:var(--rust-soft); color:var(--rust); }
  .priority.media{ background:var(--gold-soft); color:var(--leather); }
  .priority.baixa{ background:var(--sage-soft); color:var(--sage); }
  .time-pill{ font-family:'IBM Plex Mono', monospace; font-size:9px; background:var(--link-soft); color:var(--link); padding:2px 6px; border-radius:20px; white-space:nowrap; }

  .topic-detail{ margin:8px 0 0 26px; padding:10px 14px; background:var(--paper-panel); border:1px solid var(--line); border-radius:var(--radius); box-shadow:var(--shadow); display:none; font-size:12.5px; }
  .topic-detail.open{ display:block; }
  .detail-grid{ display:grid; grid-template-columns:1fr 1fr; gap:9px 16px; margin-bottom:10px; }
  .detail-item .k{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:2px; }
  .detail-item .v{ color:var(--ink); line-height:1.4; }
  .related-wrap{ margin-bottom:10px; }
  .related-wrap .k{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:4px; }
  .related-tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .related-tag{ font-size:11px; background:var(--link-soft); color:var(--link); padding:3px 8px; border-radius:20px; cursor:pointer; border:1px solid transparent; }
  .related-tag:hover{ border-color:var(--link); }
  .tip-box{ background:var(--gold-soft); border-left:3px solid var(--gold); padding:7px 10px; border-radius:2px; font-size:12px; color:var(--leather-dark); margin-bottom:10px; }
  .tip-box b{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; display:block; margin-bottom:2px; color:var(--leather); }
  .note-area textarea{ width:100%; min-height:52px; resize:vertical; font-family:'IBM Plex Sans', sans-serif; font-size:12px; padding:7px 9px; border:1px solid var(--line); border-radius:3px; background:#fff; color:var(--ink); }
  .note-area textarea:focus{ outline:1.5px solid var(--gold); }
  .note-area .k{ font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:3px; }

  .reset-link{ font-size:10px; color:var(--ink-soft); text-decoration:underline; cursor:pointer; background:none; border:none; padding:0; margin-top:6px; }

  /* overview table */
  .overview-table{ width:100%; border-collapse:collapse; font-size:12.5px; }
  .overview-table th{ text-align:left; font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); padding:6px 8px; border-bottom:1px solid var(--line); }
  .overview-table td{ padding:7px 8px; border-bottom:1px solid var(--line); vertical-align:middle; }
  .overview-table tr.hidden{ display:none; }
  .overview-table tr:hover td{ background:rgba(180,132,42,0.06); }
  .ov-name{ cursor:pointer; }
  .ov-name:hover{ text-decoration:underline; color:var(--leather); }
  .ov-check{ width:16px;height:16px; accent-color:var(--sage); cursor:pointer; }

  /* simulados view */
  .sim-form{ background:var(--paper-panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin-bottom:20px; box-shadow:var(--shadow); }
  .sim-form h4{ margin:0 0 10px; font-family:'Source Serif 4', serif; font-size:15px; }
  .sim-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:10px; }
  .sim-field label{ display:block; font-family:'IBM Plex Mono', monospace; font-size:9.5px; text-transform:uppercase; letter-spacing:.4px; color:var(--ink-soft); margin-bottom:3px; }
  .sim-field input, .sim-field textarea{ width:100%; padding:6px 8px; border:1px solid var(--line); border-radius:3px; font-family:'IBM Plex Sans', sans-serif; font-size:12.5px; background:#fff; color:var(--ink); }
  .sim-field textarea{ min-height:40px; resize:vertical; }
  .sim-submit{ background:var(--leather); color:#fff; border:none; padding:8px 16px; border-radius:3px; font-size:12.5px; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; }
  .sim-submit:hover{ background:var(--leather-dark); }

  .sim-table{ width:100%; border-collapse:collapse; font-size:12px; margin-bottom:22px; }
  .sim-table th{ text-align:left; font-family:'IBM Plex Mono', monospace; font-size:9px; text-transform:uppercase; color:var(--ink-soft); padding:6px 8px; border-bottom:1px solid var(--line); }
  .sim-table td{ padding:7px 8px; border-bottom:1px solid var(--line); }
  .sim-bar-track{ width:100px; height:6px; background:var(--gold-soft); border-radius:4px; overflow:hidden; display:inline-block; vertical-align:middle; margin-right:6px; }
  .sim-bar-fill{ height:100%; background:var(--sage); }
  .sim-del{ background:none; border:none; color:var(--rust); cursor:pointer; font-size:11px; text-decoration:underline; }

  .subj-analysis{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:10px; }
  .subj-card{ background:var(--paper-panel); border:1px solid var(--line); border-radius:var(--radius); padding:12px 14px; box-shadow:var(--shadow); }
  .subj-card h5{ margin:0 0 8px; font-family:'IBM Plex Mono', monospace; font-size:10px; text-transform:uppercase; letter-spacing:.4px; }
  .subj-card.critico h5{ color:var(--rust); }
  .subj-card.fraco h5{ color:var(--leather); }
  .subj-card.forte h5{ color:var(--sage); }
  .subj-card ul{ margin:0; padding-left:16px; font-size:12px; line-height:1.7; }
  .subj-card .empty{ font-size:11.5px; color:var(--ink-soft); font-style:italic; }

  ::-webkit-scrollbar{ width:8px; }
  ::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }
  .flash{ animation:flashPulse 1s ease; }
  @keyframes flashPulse{ 0%{ background:var(--gold-soft); } 100%{ background:var(--paper-panel); } }

  @media (max-width:760px){
    #crc-app{ flex-direction:column; }
    .sidebar{ width:100%; padding:10px; }
    .sidebar-head{ display:none; }
    .week-nav{ display:flex; flex-wrap:wrap; flex:none; overflow-x:auto; }
    .top-nav{ display:flex; gap:4px; }
    .week-btn{ padding:7px 10px; white-space:nowrap; }
    .week-btn span.wt{ max-width:110px; }
    .detail-grid, .sim-grid, .subj-analysis{ grid-template-columns:1fr; }
    .sidebar-foot{ display:none; }
  }
</style>
</head>
<body>

<div id="crc-app">
  <div class="sidebar">
    <div class="sidebar-head">
      <span class="stamp">CFC · EXAME</span>
      <h1>Roteiro CRC</h1>
      <p>Trilha de estudos — prova em 27/09/2026</p>
    </div>

    <div class="top-nav" id="topNav"></div>
    <div class="nav-section-lbl">Semanas</div>
    <div class="week-nav" id="weekNav"></div>

    <div class="sidebar-foot" id="sidebarFoot">carregando…</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="eyebrow" id="viewLabel">Semana 1</div>
        <h2 id="viewTitle">Roteiro de estudos</h2>
        <div class="sub" id="viewSub"></div>
      </div>
      <div class="countdown">
        <div class="num" id="countdownNum">--</div>
        <div class="lbl">dias até a prova</div>
      </div>
    </div>

    <div class="progress-strip">
      <div class="bar-track"><div class="bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="pct" id="progressPct">0%</div>
    </div>

    <div class="content" id="content">
      <p style="font-size:12px;color:var(--ink-soft);">Carregando seu progresso…</p>
    </div>
  </div>
</div>

<script>
(function(){

  const EXAM_DATE = new Date('2026-09-27T08:00:00');
  const STORAGE_KEY = 'crc_tracker_v3';

  // ---------- Storage abstraction ----------
  // Works inside Claude artifacts (window.storage) AND when deployed standalone
  // (e.g. Vercel) by falling back to localStorage in the browser.
  const Persist = {
    async get(key){
      if(window.storage){
        try{ const r = await window.storage.get(key, false); return r ? r.value : null; }
        catch(e){ return null; }
      }
      try{ return localStorage.getItem(key); }catch(e){ return null; }
    },
    async set(key, value){
      if(window.storage){
        try{ return await window.storage.set(key, value, false); }
        catch(e){ console.error('storage.set failed', e); return null; }
      }
      try{ localStorage.setItem(key, value); return true; }catch(e){ return null; }
    }
  };

  // ---------- Curriculum data ----------
  const WEEKS = [
    { n:1, range:'13/07 – 19/07', title:'Contabilidade Geral I', note:'Base de tudo — sem isso, nada mais faz sentido.',
      topics:[
        { name:'Patrimônio: ativo, passivo e PL', p:'alta', time:'35 min',
          video:'busque "patrimônio contábil ativo passivo PL explicado" — vídeos de 10-15 min de canais de contabilidade básica',
          note:'Desenhe o esquema Ativo = Passivo + PL com 3 exemplos de empresas diferentes (comércio, serviço, indústria)',
          onde:'Caderno de teoria — 1ª página, vai ser sua referência o ano todo',
          tip:'Pense na equação como uma balança: um lado é "o que a empresa tem", outro é "de quem é isso" (dívida ou dono).',
          related:['Fatos contábeis e lançamentos (débito/crédito)','Balanço Patrimonial: estrutura e grupos'] },
        { name:'Fatos contábeis e lançamentos (débito/crédito)', p:'alta', time:'40 min',
          video:'busque "método das partidas dobradas exemplo prático" com lançamentos passo a passo',
          note:'Resolva 5 lançamentos diferentes anotando: conta debitada, conta creditada, e por quê',
          onde:'Caderno de exercícios resolvidos — deixe uma coluna para "erro cometido"',
          tip:'Mnemônico: "quem entra credita quem sai debita" — pense em caixa entrando (débito) e saindo (crédito) do ponto de vista do ativo.',
          related:['Patrimônio: ativo, passivo e PL','Livros contábeis: Diário e Razão'] },
        { name:'Livros contábeis: Diário e Razão', p:'media', time:'20 min',
          video:'busque "livro diário e livro razão diferença" (vídeo curto, 5-8 min)',
          note:'Faça uma tabela comparando os dois livros lado a lado: função, ordem, formato',
          onde:'Mesma página do caderno de teoria, logo após lançamentos',
          tip:'Diário = "diário de bordo" (ordem cronológica). Razão = organizado "por razão/conta" (agrupado por conta).',
          related:['Fatos contábeis e lançamentos (débito/crédito)','Balancete de verificação'] },
        { name:'Balancete de verificação', p:'media', time:'20 min',
          video:'busque "balancete de verificação como montar" com exemplo em planilha',
          note:'Monte um balancete simples de 6 contas e confira se soma de débitos = soma de créditos',
          onde:'Caderno de exercícios — reserve espaço para refazer esse tipo em outras semanas',
          tip:'Se não bateu, o erro está sempre em algum lançamento anterior — o balancete só denuncia, não aponta onde.',
          related:['Livros contábeis: Diário e Razão','DRE completa'] },
      ]},
    { n:2, range:'20/07 – 26/07', title:'Contabilidade Geral II', note:'Ajustes e apuração — muito cobrados em questões de cálculo.',
      topics:[
        { name:'Depreciação, amortização e exaustão', p:'alta', time:'35 min',
          video:'busque "depreciação amortização exaustão diferença exemplos" com cálculo de taxa anual',

  const NAME_INDEX = {};
  WEEKS.forEach(w => w.topics.forEach((t,i) => { NAME_INDEX[t.name] = { weekN:w.n, idx:i }; }));
  const ALL_TOPIC_NAMES = Object.keys(NAME_INDEX);
  const REAL_TOPIC_IDS = [];
  WEEKS.forEach(w => w.topics.forEach((t,i) => { REAL_TOPIC_IDS.push('w'+w.n+'-t'+i); }));

  // ---------- State ----------
  let state = null;
  let saveTimer = null;

  function topicId(weekN, idx){ return 'w'+weekN+'-t'+idx; }

  function defaultState(){
    const topics = {};
    WEEKS.forEach(w => w.topics.forEach((t,i) => { topics[topicId(w.n,i)] = { done:false, note:'', open:false }; }));
    return {
      topics,
      report:{ daysStudied:0, hours:0, questions:0, correctPct:0 },
      simulados:[],
      activeWeek:1,
      view:'week',
      priorityFilter:'todas',
      overdueOpen:false
    };
  }

  async function loadState(){
    try{
      const raw = await Persist.get(STORAGE_KEY);
      if(raw){
        const parsed = JSON.parse(raw);
        const base = defaultState();
        base.topics = Object.assign(base.topics, parsed.topics || {});
        base.report = Object.assign(base.report, parsed.report || {});
        base.simulados = parsed.simulados || [];
        base.activeWeek = parsed.activeWeek || 1;
        base.priorityFilter = parsed.priorityFilter || 'todas';
        return base;
      }
    }catch(e){ /* nothing saved yet */ }
    return defaultState();
  }

  function saveStateDebounced(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async ()=>{ await Persist.set(STORAGE_KEY, JSON.stringify(state)); }, 350);
  }

  // ---------- Helpers ----------
  function daysUntilExam(){
    const diff = Math.ceil((EXAM_DATE - new Date()) / (1000*60*60*24));
    return diff > 0 ? diff : 0;
  }

  function parseRangeEnd(rangeStr){
    const parts = rangeStr.split('–').map(s=>s.trim());
    const endPart = parts[1] || parts[0];
    const [dd,mm] = endPart.split('/').map(Number);
    return new Date(2026, mm-1, dd, 23,59,59);
  }

  function computeWeekStatus(w){
    const ids = w.topics.map((t,i)=>topicId(w.n,i));
    const doneCount = ids.filter(id => state.topics[id] && state.topics[id].done).length;
    const overdue = parseRangeEnd(w.range) < new Date() && doneCount < ids.length;
    if(overdue) return 'overdue';
    if(doneCount === 0) return 'none';
    if(doneCount === ids.length) return 'complete';
    return 'partial';
  }

  function overallProgress(){
    const done = REAL_TOPIC_IDS.filter(id => state.topics[id] && state.topics[id].done).length;
    return Math.round((done/REAL_TOPIC_IDS.length)*100);
  }

  function weekTotalTime(w){
    const mins = w.topics.reduce((sum,t)=> sum + (parseInt(t.time)||0), 0);
    const h = Math.floor(mins/60), m = mins%60;
    return h>0 ? `${h}h${m>0?m+'min':''}` : `${m} min`;
  }

  // Maps the week's topics onto the fixed weekly routine:
  // Segunda = aula longa (1h30-2h) · Terça a Sexta = sessões curtas de almoço (20-30min)
  // Sábado = simulado · Domingo = descanso
  function buildWeekSchedule(w){
    const rows = [];
    const topics = w.topics;
    if(topics.length === 0) return rows;

    rows.push({ day:'Segunda-feira', dur:'1h30 – 2h', activity:`${topics[0].name} — aula completa (explicação, exemplos, exercícios e revisão)`, type:'long' });

    const shortDays = ['Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira'];
    const remaining = topics.slice(1);

    remaining.forEach((t,idx)=>{
      if(idx < shortDays.length){
        rows.push({ day:shortDays[idx], dur:'20-30 min', activity:`${t.name} — vídeo curto + resumo + questões`, type:'short' });
      }
    });
    // fill leftover weekdays (if this week has fewer than 4 remaining topics) with spaced review
    for(let i=remaining.length; i<shortDays.length; i++){
      rows.push({ day:shortDays[i], dur:'20-30 min', activity:'Revisão espaçada do conteúdo estudado nesta semana', type:'short' });
    }

    rows.push({ day:'Sábado', dur:'~1h', activity:'Simulado (20+ questões no estilo CRC) + correção comentada', type:'sim' });
    rows.push({ day:'Domingo', dur:'—', activity:'Descanso — sem estudos programados', type:'rest' });
    return rows;
  }

  // Splits a topic's total minutes across the study method steps, proportionally.
  function stepBreakdown(totalMinutes){
    const shares = [
      ['Explicação simples', 0.20],
      ['Exemplo prático', 0.13],
      ['Exercício fácil', 0.13],
      ['Exercício médio', 0.13],
      ['Exercício nível Exame CRC', 0.14],
      ['Correção comentada', 0.12],
      ['Revisão + flashcards', 0.15],
    ];
    let allocated = 0;
    const steps = shares.map(([label, pct], idx)=>{
      let mins = Math.round(totalMinutes * pct);
      if(idx === shares.length-1){ mins = Math.max(1, totalMinutes - allocated); }
      else { allocated += mins; }
      return { label, mins };
    });
    return steps;
  }

  function getOverdueTopics(){
    const now = new Date();
    const out = [];
    WEEKS.forEach(w=>{
      if(parseRangeEnd(w.range) < now){
        w.topics.forEach((t,i)=>{
          const id = topicId(w.n,i);
          if(!state.topics[id] || !state.topics[id].done){
            out.push({ name:t.name, weekN:w.n });
          }
        });
      }
    });
    return out;
  }

  function passesFilter(p){
    return state.priorityFilter === 'todas' || state.priorityFilter === p;
  }

    head.appendChild(cb);

    head.appendChild(metaRow);

    const detail = document.createElement('div');
    detail.className = 'topic-detail' + (entry.open ? ' open' : '');

        const row = document.createElement('div');

        stepsWrap.appendChild(row);
      });
      detail.appendChild(stepsWrap);
    }

    if(t.related && t.related.length){
      const relWrap = document.createElement('div');
      relWrap.className = 'related-wrap';
      relWrap.innerHTML = `<div class="k">Conectado com</div>`;
      const tagsWrap = document.createElement('div');
      tagsWrap.className = 'related-tags';

        tag.onclick = (e)=>{ e.stopPropagation(); jumpToTopic(rn); };
        tagsWrap.appendChild(tag);

    const noteArea = document.createElement('div');

    noteArea.innerHTML = `<div class="k">Suas anotações pessoais</div>`;

      state.topics[id].note = ta.value; saveStateDebounced();
    };

      if(!state.topics[id]) state.topics[id] = {done:false, note:'', open:false};
      state.topics[id].open = detail.classList.contains('open');
      saveStateDebounced();
    };

    card.appendChild(head);
    card.appendChild(detail);
    return card;
  }

      .replace(/[^a-z0-9]+/g,'-');

  // ---------- SIMULADOS VIEW ----------
  function renderSimuladosView(content){
    const formWrap = document.createElement('div');
    formWrap.className = 'sim-form';
    formWrap.innerHTML = `
      <h4>Registrar novo simulado</h4>
      <div class="sim-grid">
        <div class="sim-field"><label>Data</label><input type="date" id="simDate"></div>
        <div class="sim-field"><label>Total de questões</label><input type="number" id="simTotal" min="1" value="20"></div>
        <div class="sim-field"><label>Acertos</label><input type="number" id="simCorrect" min="0" value="0"></div>
      </div>
      <div class="sim-field" style="margin-bottom:10px;">
        <label>Assuntos que errou (separe por vírgula)</label>
        <textarea id="simWeak" placeholder="ex: CPC 16 — Estoques, Juros simples e compostos"></textarea>
      </div>
      <button class="sim-submit" id="simSubmit">Salvar simulado</button>
    `;
    content.appendChild(formWrap);
    document.getElementById('simDate').valueAsDate = new Date();

    document.getElementById('simSubmit').onclick = ()=>{
      const date = document.getElementById('simDate').value || new Date().toISOString().slice(0,10);
      const total = Number(document.getElementById('simTotal').value)||0;
      const correct = Number(document.getElementById('simCorrect').value)||0;
      const weakRaw = document.getElementById('simWeak').value.trim();
      const weakSubjects = weakRaw ? weakRaw.split(',').map(s=>s.trim()).filter(Boolean) : [];
      if(total <= 0) return;
      state.simulados.push({ id:'sim'+Date.now(), date, total, correct, weakSubjects, weekAtTime: state.activeWeek });
      saveStateDebounced();
      render();
    };

    // table of simulados
    if(state.simulados.length){
      const table = document.createElement('table');
      table.className = 'sim-table';
      table.innerHTML = `<thead><tr><th>Data</th><th>Acertos</th><th>Assuntos a revisar</th><th></th></tr></thead>`;
      const tbody = document.createElement('tbody');
      state.simulados.slice().sort((a,b)=> a.date < b.date ? 1 : -1).forEach(s=>{
        const pct = Math.round((s.correct/s.total)*100);
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${s.date}</td>
          <td><span class="sim-bar-track"><span class="sim-bar-fill" style="width:${pct}%"></span></span>${s.correct}/${s.total} (${pct}%)</td>
          <td>${s.weakSubjects.length ? s.weakSubjects.join(', ') : '—'}</td>
          <td><button class="sim-del" data-id="${s.id}">remover</button></td>
        `;
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      content.appendChild(table);

      table.querySelectorAll('.sim-del').forEach(btn=>{
        btn.onclick = ()=>{
          state.simulados = state.simulados.filter(s=>s.id !== btn.dataset.id);
          saveStateDebounced(); render();
        };
      });

      // subject analysis: frequency of weak subjects
      const freq = {};
      state.simulados.forEach(s=> s.weakSubjects.forEach(name=>{ freq[name] = (freq[name]||0)+1; }));
      const sortedWeak = Object.entries(freq).sort((a,b)=> b[1]-a[1]);
      const criticos = sortedWeak.filter(([,c])=>c>=3).map(([n])=>n);
      const fracos = sortedWeak.filter(([,c])=>c===2 || c===1).map(([n])=>n).filter(n=>!criticos.includes(n));
      const errFail = new Set(Object.keys(freq));
      const fortes = ALL_TOPIC_NAMES.filter(n => !errFail.has(n) && state.topics[topicId(NAME_INDEX[n].weekN, NAME_INDEX[n].idx)]?.done).slice(0,8);

      const analysis = document.createElement('div');
      analysis.className = 'subj-analysis';
      analysis.innerHTML = `
        <div class="subj-card critico">
          <h5>Assuntos críticos</h5>
          ${criticos.length ? '<ul>'+criticos.map(n=>`<li>${n}</li>`).join('')+'</ul>' : '<div class="empty">nenhum ainda — erro em 3+ simulados aparece aqui</div>'}
        </div>
        <div class="subj-card fraco">
          <h5>Assuntos fracos</h5>
          ${fracos.length ? '<ul>'+fracos.map(n=>`<li>${n}</li>`).join('')+'</ul>' : '<div class="empty">nenhum registrado ainda</div>'}
        </div>
        <div class="subj-card forte">
          <h5>Assuntos fortes</h5>
          ${fortes.length ? '<ul>'+fortes.map(n=>`<li>${n}</li>`).join('')+'</ul>' : '<div class="empty">conclua assuntos sem erros para vê-los aqui</div>'}
        </div>
      `;
      content.appendChild(analysis);
    } else {
      const empty = document.createElement('p');
      empty.style.cssText = 'font-size:12.5px;color:var(--ink-soft);';
      empty.textContent = 'Nenhum simulado registrado ainda. Depois do seu primeiro simulado de sábado, registre aqui pra acompanhar sua evolução.';
      content.appendChild(empty);
    }
  }

  function renderContent(){
    const content = document.getElementById('content');
    content.innerHTML = '';
    renderOverdueBanner(content);
    if(state.view === 'week') renderWeekView(content);
    else if(state.view === 'overview') renderOverviewView(content);
    else renderSimuladosView(content);
  }

  function render(){
    renderSidebar();
    renderTopBar();
    renderContent();
  }

  (async function init(){
    state = await loadState();
    render();
  })();

})();
</script>
</body>
</html>
